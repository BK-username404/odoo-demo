<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Odoo Search Demo</title>

<style>
body { font-family: Arial; margin: 20px; }

.search-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  border: 1px solid #ccc;
  padding: 8px;
  border-radius: 8px;
  align-items: center;
}

.chip {
  display: flex;
  align-items: center;
  gap: 5px;
  background: #e8f0ff;
  padding: 4px 8px;
  border-radius: 15px;
}

.chip input {
  border: none;
  background: transparent;
  outline: none;
  width: 100px;
}

.chip button {
  border: none;
  background: transparent;
  cursor: pointer;
  font-weight: bold;
}

.add-btn {
  background: #4a7cff;
  color: white;
  border: none;
  padding: 4px 8px;
  border-radius: 6px;
  cursor: pointer;
}

.item {
  background: #f5f5f5;
  margin: 6px 0;
  padding: 6px;
  border-radius: 6px;
}

.price {
  float: right;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>🔎 Odoo-like Search Demo</h2>

<div class="search-bar" id="searchBar">
  <button class="add-btn" onclick="addCondition()">+ умова</button>
</div>

<div id="results"></div>

<script>
const data = [
  {name:"🍎 Яблука", category:"Фрукти", price:10},
  {name:"🍐 Груші", category:"Фрукти", price:15},
  {name:"🥕 Морква", category:"Овочі", price:8},
  {name:"🥦 Броколі", category:"Овочі", price:12}
];

let conditions = [
  {value:""}
];

function addCondition() {
  conditions.push({value:""});
  renderChips();
  render();
}

function removeCondition(i) {
  conditions.splice(i, 1);
  renderChips();
  render();
}

function updateCondition(i, value) {
  conditions[i].value = value;
  render();
}

function renderChips() {
  const bar = document.getElementById("searchBar");

  bar.innerHTML = `<button class="add-btn" onclick="addCondition()">+ умова</button>`;

  conditions.forEach((c, i) => {
    bar.innerHTML += `
      <div class="chip">
        🔎
        <input 
          value="${c.value}" 
          placeholder="пошук..."
          oninput="updateCondition(${i}, this.value)">
        <button onclick="removeCondition(${i})">✕</button>
      </div>
    `;
  });
}

function render() {
  let filtered = data.filter(item => {
    return conditions.every(c =>
      item.name.toLowerCase().includes(c.value.toLowerCase())
    );
  });

  let html = "";

  filtered.forEach(i => {
    html += `
      <div class="item">
        ${i.name}
        <span class="price">${i.price} грн</span>
        <div style="font-size:12px;color:#666">${i.category}</div>
      </div>
    `;
  });

  document.getElementById("results").innerHTML = html;
}

renderChips();
render();
</script>

</body>
</html>
