<div id="searchBar"></div>
<div id="results"></div>

<script>
const data = [
  {name:"🍎 Яблука", category:"Фрукти", price:10},
  {name:"🍐 Груші", category:"Фрукти", price:15},
  {name:"🥕 Морква", category:"Овочі", price:8},
  {name:"🥦 Броколі", category:"Овочі", price:12}
];

let domain = [
  {field:"name", operator:"contains", value:""}
];

function add(field) {
  domain.push({field, operator:"contains", value:""});
  render();
}

function remove(i) {
  domain.splice(i,1);
  render();
}

function update(i, value) {
  domain[i].value = value;
  render();
}

function match(item) {
  return domain.every(d => {
    if (!d.value) return true;

    if (d.field === "name")
      return item.name.toLowerCase().includes(d.value.toLowerCase());

    if (d.field === "category")
      return item.category.toLowerCase().includes(d.value.toLowerCase());

    if (d.field === "price")
      return item.price >= Number(d.value);

    return true;
  });
}

function render() {
  // chips UI
  document.getElementById("searchBar").innerHTML = `
    <button onclick="add('name')">+ Name</button>
    <button onclick="add('category')">+ Category</button>
    <button onclick="add('price')">+ Price ≥</button>
    ` + domain.map((d,i)=>`
      <span style="border:1px solid #ccc;padding:4px;margin:3px;display:inline-block">
        ${d.field}:
        <input value="${d.value}" oninput="update(${i},this.value)" style="width:80px">
        <button onclick="remove(${i})">✕</button>
      </span>
    `).join("");

  // results
  document.getElementById("results").innerHTML =
    data.filter(match).map(i=>`
      <div>
        ${i.name} — ${i.category} — ${i.price}₴
      </div>
    `).join("");
}

render();
</script>
