<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Демо пошуку товарів</title>
  <style>
    :root {
      --bg: #111827;
      --panel: #1f2937;
      --panel-2: #273449;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #7c3aed;
      --border: #374151;
      --ok: #10b981;
      --warn: #f59e0b;
      --todo: #60a5fa;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(160deg, #0f172a 0%, #111827 60%, #0b1222 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      background: rgba(31, 41, 55, 0.9);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      backdrop-filter: blur(4px);
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: radial-gradient(circle at 30% 20%, #a78bfa, #6d28d9);
      display: grid;
      place-items: center;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .title {
      font-weight: 600;
      font-size: 15px;
      margin-right: auto;
      color: #f3f4f6;
    }

    .search-wrap {
      width: 100%;
      margin-bottom: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="search"] {
      flex: 1;
      min-width: 220px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }

    input[type="search"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
    }

    .chip {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: 120ms ease;
    }

    .chip:hover {
      border-color: #6b7280;
      transform: translateY(-1px);
    }

    .chip.active {
      background: rgba(124, 58, 237, 0.2);
      border-color: #8b5cf6;
    }

    .panel {
      background: rgba(31, 41, 55, 0.9);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .panel-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .item {
      padding: 12px 14px;
      border-bottom: 1px solid #2f3b4f;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .item:last-child { border-bottom: none; }

    .name {
      font-size: 15px;
      margin-bottom: 3px;
      color: #f9fafb;
    }

    .meta {
      font-size: 12px;
      color: var(--muted);
    }

    .status {
      font-size: 12px;
      font-weight: 600;
      border-radius: 999px;
      padding: 5px 9px;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .status.fruits {
      color: #a7f3d0;
      background: rgba(16, 185, 129, 0.18);
      border-color: rgba(16, 185, 129, 0.45);
    }

    .status.vegetables {
      color: #fde68a;
      background: rgba(245, 158, 11, 0.16);
      border-color: rgba(245, 158, 11, 0.45);
    }

    .status.berries {
      color: #bfdbfe;
      background: rgba(96, 165, 250, 0.16);
      border-color: rgba(96, 165, 250, 0.45);
    }

    .empty {
      padding: 18px 14px;
      color: var(--muted);
      font-size: 14px;
    }

    mark {
      background: rgba(124, 58, 237, 0.35);
      color: #f5f3ff;
      border-radius: 4px;
      padding: 0 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="logo">O</div>
      <div class="title">Демо: каталог товарів (яблука, груші, овочі)</div>
    </div>

    <div class="search-wrap">
      <input id="searchInput" type="search" placeholder="Пошук: яблуко, груша, овочі, сорт..." />
      <button class="chip active" data-filter="all">Всі</button>
      <button class="chip" data-filter="fruits">Фрукти</button>
      <button class="chip" data-filter="vegetables">Овочі</button>
      <button class="chip" data-filter="berries">Ягоди</button>
    </div>

    <section class="panel">
      <header class="panel-head">
        <span id="counter">Товарів: 0</span>
        <span>Статичний файл для GitHub Pages</span>
      </header>
      <ul id="list" class="list"></ul>
      <div id="empty" class="empty" hidden>Нічого не знайдено.</div>
    </section>
  </div>

  <script>
    const records = [
      { name: "Яблуко Голден", category: "fruits", type: "Солодке", stock: "132 кг" },
      { name: "Яблуко Гренні Сміт", category: "fruits", type: "Кисло-солодке", stock: "87 кг" },
      { name: "Груша Конференція", category: "fruits", type: "Соковита", stock: "64 кг" },
      { name: "Груша Вільямс", category: "fruits", type: "Ароматна", stock: "41 кг" },
      { name: "Помідор сливка", category: "vegetables", type: "Тепличний", stock: "95 кг" },
      { name: "Огірок короткоплідний", category: "vegetables", type: "Хрусткий", stock: "73 кг" },
      { name: "Морква молода", category: "vegetables", type: "Коренеплід", stock: "110 кг" },
      { name: "Полуниця свіжа", category: "berries", type: "Сезонна", stock: "38 кг" }
    ];

    const categoryLabel = {
      fruits: "Фрукти",
      vegetables: "Овочі",
      berries: "Ягоди"
    };

    const listEl = document.getElementById("list");
    const emptyEl = document.getElementById("empty");
    const counterEl = document.getElementById("counter");
    const searchEl = document.getElementById("searchInput");
    const chips = [...document.querySelectorAll(".chip")];

    let activeFilter = "all";

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function highlight(text, query) {
      const safe = escapeHtml(text);
      if (!query) return safe;
      const pattern = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "ig");
      return safe.replace(pattern, "<mark>$1</mark>");
    }

    function render() {
      const query = searchEl.value.trim().toLowerCase();
      const filtered = records.filter((r) => {
        const matchesFilter = activeFilter === "all" || r.category === activeFilter;
        const haystack = `${r.name} ${r.type} ${r.stock} ${categoryLabel[r.category]}`.toLowerCase();
        const matchesQuery = !query || haystack.includes(query);
        return matchesFilter && matchesQuery;
      });

      listEl.innerHTML = "";
      counterEl.textContent = `Товарів: ${filtered.length}`;
      emptyEl.hidden = filtered.length > 0;

      for (const item of filtered) {
        const li = document.createElement("li");
        li.className = "item";
        li.innerHTML = `
          <div>
            <div class="name">${highlight(item.name, query)}</div>
            <div class="meta">
              Категорія: ${highlight(categoryLabel[item.category], query)} · Тип: ${highlight(item.type, query)} · Залишок: ${highlight(item.stock, query)}
            </div>
          </div>
          <span class="status ${item.category}">${categoryLabel[item.category]}</span>
        `;
        listEl.appendChild(li);
      }
    }

    searchEl.addEventListener("input", render);
    chips.forEach((chip) => {
      chip.addEventListener("click", () => {
        chips.forEach((c) => c.classList.remove("active"));
        chip.classList.add("active");
        activeFilter = chip.dataset.filter;
        render();
      });
    });

    render();
  </script>
</body>
</html>
