<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Odoo Search Demo</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    input, button { margin: 5px; padding: 6px; }
    .kanban { display: flex; gap: 20px; margin-top: 20px; }
    .column { border: 1px solid #ccc; padding: 10px; width: 200px; border-radius: 8px; }
    .item { background: #f5f5f5; margin: 5px 0; padding: 5px; border-radius: 5px; }
  </style>
</head>
<body>

<h2>🔎 Пошук (як в Odoo)</h2>

<input id="search" placeholder="Пошук товару..." oninput="render()" />

<button onclick="setFilter('all')">Все</button>
<button onclick="setFilter('Фрукти')">Фрукти</button>
<button onclick="setFilter('Овочі')">Овочі</button>

<button onclick="toggleGroup()">Групувати</button>

<div id="app"></div>

<script>
const data = [
  {name:'🍎 Яблука', category:'Фрукти'},
  {name:'🍐 Груші', category:'Фрукти'},
  {name:'🥕 Морква', category:'Овочі'},
  {name:'🥦 Броколі', category:'Овочі'}
];

let filter = 'all';
let grouped = false;

function setFilter(f) {
  filter = f;
  render();
}

function toggleGroup() {
  grouped = !grouped;
  render();
}

function getFiltered() {
  let q = document.getElementById('search').value.toLowerCase();

  return data.filter(i => {
    let matchText = i.name.toLowerCase().includes(q);
    let matchFilter = filter === 'all' || i.category === filter;
    return matchText && matchFilter;
  });
}

function render() {
  let items = getFiltered();
  let app = document.getElementById('app');

  if (!grouped) {
    app.innerHTML = `
      <div>
        ${items.map(i => `<div class="item">${i.name} (${i.category})</div>`).join('')}
      </div>
    `;
    return;
  }

  let groups = {};
  items.forEach(i => {
    if (!groups[i.category]) groups[i.category] = [];
    groups[i.category].push(i);
  });

  let html = `<div class="kanban">`;

  for (let g in groups) {
    html += `<div class="column"><b>${g}</b>`;
    groups[g].forEach(i => {
      html += `<div class="item">${i.name}</div>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  app.innerHTML = html;
}

render();
</script>

</body>
</html>
